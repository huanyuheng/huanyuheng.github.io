<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
  {%- include head.html -%}
  <body>
    <button class="theme-toggle" id="theme-toggle" type="button" aria-label="切换主题">🌙 深色</button>
    {%- include header.html -%}

    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        <div class="site-shell">
          <!-- 左侧固定导航 -->
          <aside class="site-sidebar">
            {% include sidebar.html %}
          </aside>

          <!-- 中间正文 -->
          <div class="site-main">
            <div class="content-wrapper">
              {{ content }}
            </div>
          </div>

          <!-- 右侧标签 + 工作 -->
          <aside class="site-rightbar">
            {% include right-sidebar.html %}
          </aside>
        </div>
      </div>
    </main>

    <button class="back-to-top" id="back-to-top" type="button" aria-label="回到顶部">↑</button>

    {%- include footer.html -%}
    <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
  </body>
</html>
